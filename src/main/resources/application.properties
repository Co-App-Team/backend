spring.application.name=CoApp

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}

spring.config.import=optional:file:./local.properties

# Use the PORT env var if it exists (Render uses 10000), otherwise default to 8080 (for local)
server.port=${PORT:8080}

# Email Sender
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=no.reply.coapp@gmail.com
spring.mail.password=${NO_REPLY_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Config
security.jwt.secret-key =${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000