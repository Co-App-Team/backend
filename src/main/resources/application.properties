spring.application.name=CoApp

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

spring.config.import=optional:file:./local.properties

# Use the PORT env var if it exists (Render uses 10000), otherwise default to 8080 (for local)
server.port=${PORT:8080}

# Email Sender
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=no.reply.coapp@gmail.com
spring.mail.password=${NO_REPLY_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Config
security.jwt.secret-key =${JWT_SECRET_KEY}
# Time in milliseconds
security.jwt.expiration-time=3600000

# GenAI service choice, this allows us to switch to different GenAI service (i.e. OpenAI )
gen-ai.provider=gemini

# Gemini Config
google.genai.api.key=${GOOGLE_GENAI_API_KEY}
google.genai.model=gemini-2.5-flash-lite